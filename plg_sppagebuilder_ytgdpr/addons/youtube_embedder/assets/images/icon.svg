<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
    <!-- Red background -->
    <rect width="48" height="48" rx="10" ry="10" fill="#FF0000" />
    <!-- Play triangle, shifted slightly up-left to make room for badge -->
